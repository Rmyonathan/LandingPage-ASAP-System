<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Zoom</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <h1>Test Image Zoom</h1>
    
    <img src="Assets/Master Barang.jpg" alt="Test Image" class="w-full h-48 object-cover rounded-lg mb-4 image-zoom-trigger" 
         data-title="Test Image" 
         data-description="This is a test image to check if zoom functionality works.">
    
    <!-- Image Zoom Modal -->
    <div id="imageZoomModal" class="image-zoom-modal">
        <div class="image-zoom-content">
            <span class="image-zoom-close">&times;</span>
            <button class="image-zoom-prev" id="zoomPrev" aria-label="Previous image">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="image-zoom-next" id="zoomNext" aria-label="Next image">
                <i class="fas fa-chevron-right"></i>
            </button>
            <img id="zoomImage" src="" alt="">
            <div class="image-zoom-description">
                <h3 id="zoomTitle"></h3>
                <p id="zoomDescription"></p>
                <div class="image-zoom-counter">
                    <span id="currentImageIndex">1</span> / <span id="totalImages">1</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
