version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "tokoglobalteknik"
    assignees:
      - "tokoglobalteknik"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      # Ignore updates to packages that are not used in production
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
        # Allow minor and patch updates
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
        # Allow minor and patch updates
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]
        # Allow minor and patch updates

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "tokoglobalteknik"
    assignees:
      - "tokoglobalteknik"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"